<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}Gbẹdu{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #0A0A0F; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .wrapper { width: 100%; background-color: #0A0A0F; padding: 40px 16px; box-sizing: border-box; }
    .card { max-width: 560px; margin: 0 auto; background-color: #1E1E2E; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
    .header { padding: 32px 40px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 22px; font-weight: 700; color: #D4AF37; letter-spacing: -0.5px; }
    .body { padding: 32px 40px; }
    .greeting { font-size: 22px; font-weight: 600; color: #F4F4F5; margin: 0 0 12px; }
    .body-text { font-size: 15px; line-height: 1.7; color: #A1A1AA; margin: 0 0 24px; }
    .cta-btn { display: inline-block; padding: 14px 28px; background-color: #D4AF37; color: #0A0A0F; font-size: 15px; font-weight: 700; text-decoration: none; border-radius: 10px; }
    .cta-wrap { margin: 28px 0; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 28px 0; }
    .meta-text { font-size: 13px; color: #52525B; line-height: 1.6; }
    .footer { padding: 20px 40px 28px; text-align: center; }
    .footer-text { font-size: 12px; color: #3F3F46; line-height: 1.6; }
    .footer-text a { color: #71717A; text-decoration: none; }
    @media (max-width: 600px) {
      .body { padding: 24px 24px; }
      .header { padding: 24px 24px 20px; }
      .footer { padding: 16px 24px 24px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <div class="logo-row">
          <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <span class="logo-text">Gbẹdu</span>
        </div>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p class="footer-text">
          You received this email because you have a Gbẹdu account.<br />
          <a href="{{ unsubscribe_url | default('https://app.gbedu.io/settings/notifications') }}">Manage notifications</a>
          &nbsp;·&nbsp;
          <a href="https://app.gbedu.io/privacy">Privacy</a>
          &nbsp;·&nbsp;
          <a href="https://app.gbedu.io">Gbẹdu</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
