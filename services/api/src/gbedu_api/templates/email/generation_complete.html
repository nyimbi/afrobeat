<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your track is ready</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0F;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#0A0A0F;padding:40px 20px;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;width:100%;background:#111117;border-radius:12px;border:1px solid rgba(255,255,255,0.08);">
      <!-- Header -->
      <tr>
        <td style="padding:32px 40px 24px;border-bottom:1px solid rgba(255,255,255,0.06);">
          <span style="font-size:26px;font-weight:700;color:#D4AF37;letter-spacing:-0.5px;">Gbẹdu</span>
        </td>
      </tr>
      <!-- Hero -->
      <tr>
        <td style="padding:36px 40px 28px;border-bottom:1px solid rgba(255,255,255,0.06);">
          <p style="margin:0 0 8px;font-size:13px;font-family:monospace;text-transform:uppercase;letter-spacing:0.1em;color:#71717A;">
            Your track is ready
          </p>
          <h1 style="margin:0 0 20px;font-size:24px;font-weight:700;color:#E4E4E7;line-height:1.25;">
            {{ track_title }}
          </h1>
          <p style="margin:0 0 28px;font-size:15px;color:#A1A1AA;line-height:1.6;">
            Hi {{ full_name }}, your Gbẹdu track has finished generating.
            Open your library to listen, download, or share it.
          </p>
          <table cellpadding="0" cellspacing="0" role="presentation">
            <tr>
              <td style="border-radius:8px;background:#D4AF37;">
                <a href="{{ track_url }}"
                   style="display:inline-block;padding:13px 28px;font-size:14px;font-weight:600;color:#0A0A0F;text-decoration:none;border-radius:8px;">
                  Listen Now
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <!-- Footer -->
      <tr>
        <td style="padding:20px 40px 28px;">
          <p style="margin:0;font-size:12px;color:#52525B;text-align:center;">
            © 2026 Gbẹdu &nbsp;·&nbsp;
            <a href="https://app.gbedu.io/unsubscribe" style="color:#71717A;text-decoration:none;">Unsubscribe</a>
          </p>
        </td>
      </tr>
    </table>
  </td></tr>
</table>
</body>
</html>
