---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: gbedu-prod
  labels:
    app.kubernetes.io/part-of: gbedu
spec:
  provider:
    vault:
      server: "https://vault.internal.gbedu.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "gbedu-prod"
          serviceAccountRef:
            name: gbedu-vault-auth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gbedu-vault-auth
  namespace: gbedu-prod
  labels:
    app.kubernetes.io/part-of: gbedu
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gbedu-secrets
  namespace: gbedu-prod
  labels:
    app.kubernetes.io/name: gbedu
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: gbedu
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gbedu-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/gbedu/prod/database
        property: url

    - secretKey: REDIS_URL
      remoteRef:
        key: secret/gbedu/prod/redis
        property: url

    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/gbedu/prod/app
        property: secret_key

    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: secret/gbedu/prod/stripe
        property: secret_key

    - secretKey: STRIPE_PUBLISHABLE_KEY
      remoteRef:
        key: secret/gbedu/prod/stripe
        property: publishable_key

    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: secret/gbedu/prod/stripe
        property: webhook_secret

    - secretKey: PAYSTACK_SECRET_KEY
      remoteRef:
        key: secret/gbedu/prod/paystack
        property: secret_key

    - secretKey: PAYSTACK_PUBLIC_KEY
      remoteRef:
        key: secret/gbedu/prod/paystack
        property: public_key

    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: secret/gbedu/prod/r2
        property: access_key_id

    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/gbedu/prod/r2
        property: secret_access_key

    - secretKey: SENTRY_DSN
      remoteRef:
        key: secret/gbedu/prod/sentry
        property: dsn

    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: secret/gbedu/prod/app
        property: nextauth_secret

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: secret/gbedu/prod/smtp
        property: password

    - secretKey: SMTP_USER
      remoteRef:
        key: secret/gbedu/prod/smtp
        property: user
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: gbedu-prod
  labels:
    app.kubernetes.io/part-of: gbedu
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .token }}",
                "auth": "{{ printf "%s:%s" .username .token | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: secret/gbedu/prod/ghcr
        property: username

    - secretKey: token
      remoteRef:
        key: secret/gbedu/prod/ghcr
        property: token
