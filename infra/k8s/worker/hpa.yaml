---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gbedu-worker
  namespace: gbedu-prod
  labels:
    app: gbedu-worker
    app.kubernetes.io/name: gbedu-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: gbedu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gbedu-worker
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # Keep workers alive longer — in-flight Celery tasks ack on completion.
      # Premature scale-down can cause task re-delivery on prefetched messages.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 50
          periodSeconds: 30
      selectPolicy: Max
