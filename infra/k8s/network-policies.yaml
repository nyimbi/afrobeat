---
# Default deny-all ingress and egress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gbedu-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gbedu-prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# API: ingress from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-api-ingress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app: gbedu-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    # Allow Prometheus scraping from observability namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
          protocol: TCP
---
# API: egress to postgres, redis, ml service, external (Stripe/Paystack/Sentry/R2)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-api-egress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app: gbedu-api
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cache
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    # ML service (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app: gbedu-ml
      ports:
        - port: 8001
          protocol: TCP
    # External HTTPS (Stripe, Paystack, Sentry, R2, SMTP)
    - ports:
        - port: 443
          protocol: TCP
        - port: 587
          protocol: TCP
    # OpenTelemetry collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# Worker: egress to postgres, redis, ml service, R2 (external)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-worker-egress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app: gbedu-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
  egress:
    # PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cache
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    # ML service
    - to:
        - podSelector:
            matchLabels:
              app: gbedu-ml
      ports:
        - port: 8001
          protocol: TCP
    # R2 / external HTTPS
    - ports:
        - port: 443
          protocol: TCP
    # OpenTelemetry collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# Web: ingress from ingress controller only, no internal egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-web-ingress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app: gbedu-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # Web only calls external HTTPS (API is external via ingress, not internal)
    - ports:
        - port: 443
          protocol: TCP
    # OpenTelemetry collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# ML service: ingress only from api + worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-ml-ingress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app: gbedu-ml
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gbedu-api
        - podSelector:
            matchLabels:
              app: gbedu-worker
      ports:
        - port: 8001
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8001
          protocol: TCP
  egress:
    # ML model downloads and R2 access
    - ports:
        - port: 443
          protocol: TCP
    # OpenTelemetry collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# CronJob pods: same egress as worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gbedu-cronjob-egress
  namespace: gbedu-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cronjob
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cache
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
