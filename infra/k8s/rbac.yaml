---
# ServiceAccount: gbedu-api
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gbedu-api
  namespace: gbedu-prod
  labels:
    app: gbedu-api
    app.kubernetes.io/name: gbedu-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: gbedu
automountServiceAccountToken: false
---
# Role: gbedu-api — read its own configmap and secret (via projected volume if needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gbedu-api
  namespace: gbedu-prod
  labels:
    app: gbedu-api
    app.kubernetes.io/part-of: gbedu
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["gbedu-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gbedu-api
  namespace: gbedu-prod
  labels:
    app: gbedu-api
    app.kubernetes.io/part-of: gbedu
subjects:
  - kind: ServiceAccount
    name: gbedu-api
    namespace: gbedu-prod
roleRef:
  kind: Role
  name: gbedu-api
  apiGroup: rbac.authorization.k8s.io
