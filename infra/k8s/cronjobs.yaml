---
# CronJob: metrics-rollup — aggregate raw event rows into hourly summary tables (every 6h)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metrics-rollup
  namespace: gbedu-prod
  labels:
    app.kubernetes.io/name: metrics-rollup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/part-of: gbedu
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: metrics-rollup
            app.kubernetes.io/component: cronjob
            app.kubernetes.io/part-of: gbedu
        spec:
          serviceAccountName: gbedu-cronjob
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: metrics-rollup
              image: ghcr.io/nyimbi/gbedu-worker:latest
              imagePullPolicy: Always
              command:
                - python
                - -m
                - gbedu_worker.management.metrics_rollup
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              envFrom:
                - configMapRef:
                    name: gbedu-config
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gbedu-secrets
                      key: DATABASE_URL
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: gbedu-secrets
                      key: REDIS_URL
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
          imagePullSecrets:
            - name: ghcr-credentials
