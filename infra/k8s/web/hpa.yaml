---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gbedu-web
  namespace: gbedu-prod
  labels:
    app: gbedu-web
    app.kubernetes.io/name: gbedu-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: gbedu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gbedu-web
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gbedu-web
  namespace: gbedu-prod
  labels:
    app: gbedu-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: gbedu
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gbedu-web
