global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: gbedu
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

rule_files:
  - /etc/prometheus/prometheus-rules.yml

scrape_configs:
  # ── Prometheus self-scrape ─────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ── Gbẹdu API service ─────────────────────────────────────────────────────
  - job_name: gbedu_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── Gbẹdu ML inference service ────────────────────────────────────────────
  - job_name: gbedu_ml
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml:8001
    # ML scrape interval longer — model-side metrics are slower-moving.
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── Celery worker — prometheus_client HTTP server on :9090 ────────────────
  - job_name: gbedu_worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9090
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── postgres_exporter ─────────────────────────────────────────────────────
  - job_name: postgres_exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres-exporter:9187
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── redis_exporter ────────────────────────────────────────────────────────
  - job_name: redis_exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - redis-exporter:9121
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
