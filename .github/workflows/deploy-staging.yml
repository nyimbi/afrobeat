name: Deploy — Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gbedu

jobs:
  # ── Build + push images ───────────────────────────────────────────────────────

  build-push:
    name: Build + push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        service: [api, worker, ml, web]

    outputs:
      sha_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=staging

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Deploy to staging cluster ─────────────────────────────────────────────────

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-push]
    environment:
      name: staging
      url: https://staging-api.gbedu.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}
          context: staging-cluster

      - name: Set image tags in manifests
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|gbedu-api:.*|${{ env.IMAGE_PREFIX }}-api:${SHA}|g" infra/k8s/api-deployment.yaml
          sed -i "s|gbedu-worker:.*|${{ env.IMAGE_PREFIX }}-worker:${SHA}|g" infra/k8s/worker-deployment.yaml
          sed -i "s|gbedu-ml:.*|${{ env.IMAGE_PREFIX }}-ml:${SHA}|g" infra/k8s/ml-deployment.yaml
          sed -i "s|gbedu-web:.*|${{ env.IMAGE_PREFIX }}-web:${SHA}|g" infra/k8s/web-deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f infra/k8s/ --context staging-cluster

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gbedu-api --timeout=300s
          kubectl rollout status deployment/gbedu-worker --timeout=300s
          kubectl rollout status deployment/gbedu-ml --timeout=300s
          kubectl rollout status deployment/gbedu-web --timeout=300s

  # ── Smoke test ────────────────────────────────────────────────────────────────

  smoke-test:
    name: Smoke test — staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]

    steps:
      - name: Wait for DNS propagation
        run: sleep 15

      - name: Health check — API
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging-api.gbedu.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "API health check failed after 10 attempts"
          exit 1

      - name: Health check — ML service
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging-ml.gbedu.com/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "ML health check failed: got $STATUS"
            exit 1
          fi

      - name: Readiness probe — API
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging-api.gbedu.com/ready || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "API readiness check failed: got $STATUS"
            exit 1
          fi

  # ── Notify ────────────────────────────────────────────────────────────────────

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke-test]
    if: always()

    steps:
      - name: Notify success
        if: needs.smoke-test.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: *Staging deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Commit", "value": "<${{ github.event.head_commit.url }}|${{ github.sha }}>" , "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Environment", "value": "<https://staging-api.gbedu.com|staging>", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify failure
        if: needs.smoke-test.result != 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: *Staging deploy FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Commit", "value": "<${{ github.event.head_commit.url }}|${{ github.sha }}>", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Workflow run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
