name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.4.18"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gbedu

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: ruff check
        run: uv run ruff check libs/ services/ --output-format=github

      - name: ruff format check
        run: uv run ruff format --check libs/ services/

  # ── Type-check ────────────────────────────────────────────────────────────────

  typecheck:
    name: Type-check (pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: pyright
        run: uv run pyright libs/ services/

  # ── Unit tests ────────────────────────────────────────────────────────────────

  test-unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            libs/core/tests/ \
            libs/audio/tests/ \
            --cov=libs/core/src \
            --cov=libs/audio/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── Integration tests ─────────────────────────────────────────────────────────

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gbedu
          POSTGRES_PASSWORD: gbedu
          POSTGRES_DB: gbedu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gbedu -d gbedu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://gbedu:gbedu@localhost:5432/gbedu_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      ML_SERVICE_URL: http://localhost:8001
      ML_SERVICE_API_KEY: test-ml-key
      R2_BUCKET_NAME: gbedu-test
      R2_PUBLIC_URL: http://localhost:4566
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      FROM_EMAIL: test@gbedu.com

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run database migrations
        run: uv run --package gbedu-core alembic upgrade head

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            services/api/tests/ \
            services/worker/tests/ \
            -m integration \
            -v --tb=short

  # ── Security scan ─────────────────────────────────────────────────────────────

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: bandit — Python security lint
        run: |
          uv run pip install bandit[toml]
          uv run bandit -r libs/ services/ \
            -x "*/tests/*,*/__pycache__/*" \
            -f json -o bandit-report.json || true
          uv run bandit -r libs/ services/ \
            -x "*/tests/*,*/__pycache__/*" \
            -ll

      - name: npm audit (web)
        working-directory: services/web
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Trivy — container vulnerability scan (api)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: services/api
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ── Docker build ──────────────────────────────────────────────────────────────

  build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, ml]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: gbedu-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  build-web:
    name: Docker build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: services/web
          push: false
          tags: gbedu-web:ci-${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
