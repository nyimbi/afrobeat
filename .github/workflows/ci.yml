name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.4.18"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gbedu

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: ruff check
        run: uv run ruff check libs/ services/ tests/ --output-format=github

      - name: ruff format check
        run: uv run ruff format --check libs/ services/ tests/

  # ── Type-check ────────────────────────────────────────────────────────────────

  typecheck:
    name: Type-check (pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: pyright
        run: uv run pyright libs/ services/

  # ── Unit tests ────────────────────────────────────────────────────────────────

  test-unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            libs/audio/tests/ \
            -q --tb=short \
            --cov=libs \
            --cov=services \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Integration tests ─────────────────────────────────────────────────────────

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-unit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gbedu
          POSTGRES_PASSWORD: gbedu
          POSTGRES_DB: gbedu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gbedu -d gbedu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://gbedu:gbedu@localhost:5432/gbedu_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET_KEY: test-secret-key-for-ci-32chars!!
      JWT_ALGORITHM: HS256
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      ML_SERVICE_URL: http://localhost:8001
      ML_SERVICE_API_KEY: test-ml-key
      R2_BUCKET_NAME: gbedu-test
      R2_PUBLIC_URL: http://localhost:4566
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      FROM_EMAIL: test@gbedu.io
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Run database migrations
        run: uv run --package gbedu-core alembic upgrade head

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -q --tb=short \
            -m integration

  # ── Docker build — Python services ───────────────────────────────────────────

  build-api:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-unit]

    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, ml]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: gbedu-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Docker build — web (Node) ─────────────────────────────────────────────────

  build-web:
    name: Docker build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        working-directory: services/web
        run: npm ci

      - name: Build Next.js app
        working-directory: services/web
        run: npm run build

  # ── Security scan ─────────────────────────────────────────────────────────────

  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: false
          tags: gbedu-api:scan-${{ github.sha }}
          load: true
          cache-from: type=gha,scope=api

      - name: Trivy — scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gbedu-api:scan-${{ github.sha }}
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  load-test-syntax:
    name: Load test syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Validate locustfile imports cleanly
        run: |
          uv run python -c "
          import ast, sys
          with open('tests/load/locustfile.py') as f:
              src = f.read()
          try:
              ast.parse(src)
              print('locustfile.py: syntax OK')
          except SyntaxError as e:
              print(f'locustfile.py: SYNTAX ERROR: {e}')
              sys.exit(1)
          "

      - name: Validate chaos scenarios syntax
        run: |
          uv run python -c "
          import ast, sys
          with open('tests/chaos/scenarios.py') as f:
              src = f.read()
          try:
              ast.parse(src)
              print('chaos/scenarios.py: syntax OK')
          except SyntaxError as e:
              print(f'chaos/scenarios.py: SYNTAX ERROR: {e}')
              sys.exit(1)
          "

      - name: Property-based tests (Hypothesis)
        run: |
          uv run pytest tests/unit/test_property_based.py -v \
            --tb=short \
            -x \
            --hypothesis-seed=0
        env:
          GBEDU_ML_API_KEY: test-ml-internal-api-key

      - name: Validate k8s manifests (offline YAML + required fields)
        run: |
          uv run python - << 'PYEOF'
          import yaml, sys
          from pathlib import Path
          k8s_dir = Path("infra/k8s")
          errors = []
          for f in sorted(k8s_dir.rglob("*.yaml")):
              try:
                  docs = list(yaml.safe_load_all(f.read_text()))
                  for i, doc in enumerate(docs):
                      if not doc:
                          continue
                      for field in ("apiVersion", "kind", "metadata"):
                          if field not in doc:
                              errors.append(f"{f}[{i}]: missing '{field}'")
              except yaml.YAMLError as e:
                  errors.append(f"{f}: YAML error: {e}")
          if errors:
              for e in errors:
                  print(f"FAIL: {e}")
              sys.exit(1)
          print(f"OK: all {len(list(k8s_dir.rglob('*.yaml')))} manifests valid")
          PYEOF
